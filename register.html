<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fun Play Kids - Register</title>

    <link rel="icon" href="images/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="login-page">
        <div class="login-right-panel">
            <div class="login-inner">
                <div class="auth-logo">
                    <a href="index.html" class="logo-link">
                        <img src="images/logo.png" alt="Fun Play Kids logo">
                    </a>
                </div>
                <h2 class="welcome">Create Account</h2>
                <p class="sub">Start your Fun Play Kids journey</p>

                <form id="register-form" class="login-form" action="#" method="post">
                    <div class="input-box">
                        <input type="text" name="username" placeholder="Username" required>
                    </div>
                    <div class="input-box">
                        <input type="email" name="email" placeholder="Email address" required>
                    </div>
                    <div class="input-box password-box">
                        <input id="password" name="password" type="password" placeholder="Password" required>
                        <i class="fas fa-eye toggle-eye"></i>
                    </div>
                    <div class="input-box password-box">
                        <input type="password" name="confirm_password" placeholder="Confirm password" required>
                    </div>

                    <button type="submit" class="login-btn-main">Register</button>

                    <div class="divider"><span>OR</span></div>
                    <div class="auth-switch">
                        Already have an account? <a href="login.html">Login</a>
                    </div>
                </form>
                <div id="register-success" class="success-popup">Registered successfully!</div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
