<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fun Play Kids</title>

    <link rel="icon" href="images/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Poppins:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="login-page">
        <div class="login-right-panel">
            <div class="login-inner">
                <div class="auth-logo">
                    <a href="index.html" class="logo-link">
                        <img src="images/logo.png" alt="Fun Play Kids logo">
                    </a>
                </div>
                <h2 class="welcome">Welcome Back 👋</h2>
                <p class="sub">Please sign in now</p>

                <form class="login-form" action="#" method="post">
                    <div class="input-box">
                        <input type="text" name="username" placeholder="Username" required>
                    </div>

                    <div class="input-box password-box">
                        <input id="password" name="password" type="password" placeholder="Password" required>
                        <i class="fas fa-eye toggle-eye"></i>
                    </div>

                    <div class="login-options">
                        <label>
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn-main">Log In</button>

                    <div class="divider"><span>Or continue with</span></div>

                    <div class="social-login">
                        <button type="button" class="icon-btn google"><i class="fab fa-google"></i></button>
                        <button type="button" class="icon-btn facebook"><i class="fab fa-facebook-f"></i></button>
                        <button type="button" class="icon-btn apple"><i class="fab fa-apple"></i></button>
                    </div>

                    <div class="auth-switch">
                        New here? <a href="register.html">Register</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>

</html>
